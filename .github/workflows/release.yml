name: Release to PyPI

# Publishes the package to PyPI when a version tag (e.g. v1.1.0) is pushed.
# Uses PyPI Trusted Publishing (OIDC) - no API token needs to be stored.
# To enable: configure a Trusted Publisher for this repo/workflow on PyPI
# (https://docs.pypi.org/trusted-publishers/).

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version=$(python - <<'PY'
          import pathlib
          import sys
          if sys.version_info >= (3, 11):
              import tomllib
          else:
              import tomli as tomllib
          print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])
          PY
          )
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$version" ]; then
            echo "::error::Release tag $GITHUB_REF_NAME does not match pyproject.toml version $version"
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
