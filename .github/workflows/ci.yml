name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev and gui extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gui]"

      - name: Run test suite
        run: pytest tests/ -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Critical errors (syntax / undefined names) - whole package
        run: flake8 placebot tests --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Style check on new code (gui + tests)
        run: flake8 placebot/gui tests

      - name: Black formatting check on new code (advisory)
        run: black --check placebot/gui tests
        continue-on-error: true
