name: Build standalone installers

# Builds double-clickable Windows (.exe) and macOS (.dmg) installers that bundle
# their own Python runtime and pip-install the placebot wheel into it, then
# attaches them to the GitHub Release for the tag.
#
# Kept separate from release.yml (PyPI) so an installer failure never blocks the
# PyPI publish, and vice versa. Use the manual "Run workflow" button to dry-run
# the builds on a branch without tagging.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  # Single source of truth for the bundled Python across both installers.
  PYTHON_EMBED_VERSION: "3.11.9"
  # python-build-standalone release that ships the macOS CPython above.
  PBS_DATE: "20240814"

jobs:
  wheel:
    name: Build wheel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Read package version
        id: meta
        run: |
          v=$(python -c "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "PlaceBot version: $v"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  windows:
    name: Windows installer
    needs: wheel
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate app icon
        run: |
          python -m pip install --upgrade pillow
          python installer/make_icons.py placebot/gui/placebot_logo.png installer/assets/placebot.ico

      - name: Stage runtime (embeddable Python + placebot[gui])
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem dist\placebot-*.whl | Select-Object -First 1).FullName
          ./installer/windows/build.ps1 -WheelPath $wheel -PythonVersion $env:PYTHON_EMBED_VERSION

      - name: Compile installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc `
            "/DMyAppVersion=${{ needs.wheel.outputs.version }}" `
            "/DStageDir=$PWD\build\win\PlaceBot" `
            "/DIconFile=$PWD\installer\assets\placebot.ico" `
            "installer\windows\placebot.iss"

      - uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/PlaceBot-Setup-*.exe

  macos:
    name: macOS installer (${{ matrix.arch }})
    needs: wheel
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            arch: arm64
          - runner: macos-13   # Intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Build .app + .dmg
        env:
          VERSION: ${{ needs.wheel.outputs.version }}
          ARCH: ${{ matrix.arch }}
          PYTHON_VERSION: ${{ env.PYTHON_EMBED_VERSION }}
          PBS_DATE: ${{ env.PBS_DATE }}
        run: |
          WHEEL=$(ls dist/placebot-*.whl | head -n1)
          WHEEL_PATH="$WHEEL" bash installer/macos/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: installer-macos-${{ matrix.arch }}
          path: dist/PlaceBot-*-${{ matrix.arch }}.dmg

  release:
    name: Attach installers to release
    needs: [windows, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create/update the GitHub Release
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: artifacts/
          merge-multiple: true

      - name: Publish installers to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PlaceBot-Setup-*.exe
            artifacts/PlaceBot-*.dmg
